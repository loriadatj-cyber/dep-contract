name: Feature request
description: Propose a rule, lockfile format, or workflow improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    attributes:
      label: Maintainer problem
      description: What review or supply-chain problem should this solve?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed behavior
    validations:
      required: true
